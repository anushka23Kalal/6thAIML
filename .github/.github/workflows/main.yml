name: CI Pipeline

on: push

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install packages
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest

      - name: Build Docker
        run: docker build -t myapp .

      - name: Run Docker
        run: docker run -d -p 8000:8000 myapp